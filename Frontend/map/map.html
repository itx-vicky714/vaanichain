<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--white:#fff;--border:#e2e6ef;--border2:#c8cfe0;
  --text:#0f172a;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --blue:#2563eb;--indigo:#4f46e5;--green:#059669;--green2:#d1fae5;
  --amber:#d97706;--amber2:#fef3c7;--red:#dc2626;--red2:#fee2e2;
  --grad1:linear-gradient(135deg,#2563eb,#4f46e5);
  --grad2:linear-gradient(135deg,#059669,#0ea5e9);
  --grad3:linear-gradient(135deg,#d97706,#dc2626);
  --sans:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 4px 16px rgba(0,0,0,.1);--r:12px;
}
html,body{height:100%;font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;overflow:hidden}

/* NAV */
.nav{background:var(--white);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:var(--shadow);z-index:1000}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.nav-icon{width:36px;height:36px;border-radius:10px;background:var(--grad1);display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-name{font-size:18px;font-weight:800;color:var(--text)}
.nav-name span{background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-spc{flex:1}
.nav-tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:var(--sans)}
.nav-tab:hover{background:var(--bg);color:var(--text2)}
.nav-tab.on{background:var(--grad1);color:#fff}
.nav-pill{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:none;cursor:default}
.pill-ok{background:var(--green2);color:var(--green)}
.pill-risk{background:var(--amber2);color:var(--amber)}
.pill-high{background:var(--red2);color:var(--red);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* MAIN LAYOUT */
.main{display:flex;flex:1;min-height:0}

/* SIDEBAR */
.sidebar{width:320px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px}
.sb-filters{display:flex;gap:5px;flex-wrap:wrap}
.sf-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--text3);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.sf-btn:hover{border-color:var(--blue);color:var(--blue)}
.sf-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.sf-btn.road.on{background:#92400e;border-color:#92400e}
.sf-btn.rail.on{background:#1447be;border-color:#1447be}
.sf-btn.air.on{background:#6d28d9;border-color:#6d28d9}
.sf-btn.sea.on{background:#065f46;border-color:#065f46}
.sb-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* SHIPMENT LIST ITEMS */
.ship-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:flex;gap:10px;align-items:flex-start}
.ship-item:hover{background:#f8fafc}
.ship-item.active{background:#eff6ff;border-left:3px solid var(--blue)}
.ship-item.at_risk{border-left:3px solid var(--amber)}
.ship-item.active.at_risk{background:#fffbeb;border-left:3px solid var(--amber)}
.si-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.si-road{background:#fef3c7}.si-rail{background:#dbeafe}.si-air{background:#ede9fe}.si-sea{background:#d1fae5}
.si-info{flex:1;min-width:0}
.si-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue);margin-bottom:2px}
.si-route{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.si-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.s-on_time{background:var(--green2);color:var(--green)}
.s-at_risk{background:var(--amber2);color:var(--amber)}

/* MAP */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* MAP LEGEND */
.map-legend{position:absolute;bottom:24px;right:16px;z-index:500;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow2);min-width:160px}
.ml-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.ml-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:5px}
.ml-line{width:24px;height:3px;border-radius:2px}
.ml-dot{width:10px;height:10px;border-radius:50%}

/* DETAIL PANEL */
.detail-panel{position:absolute;top:16px;right:16px;z-index:500;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow2);width:260px;display:none;animation:slideIn .2s ease}
.detail-panel.open{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.dp-close{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--text4);font-size:16px;line-height:1}
.dp-id{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue);margin-bottom:4px}
.dp-route{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.dp-cell{background:var(--bg);border-radius:7px;padding:8px 10px}
.dp-key{font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.dp-val{font-size:12px;font-weight:700;color:var(--text);font-family:var(--mono)}
.dp-tracker{margin-top:4px}
.dp-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:5px 0 4px}
.dp-fill{height:100%;border-radius:3px;background:var(--grad2)}
.dp-bar-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text4);font-family:var(--mono)}
.dp-risk{font-size:11px;font-weight:600;padding:5px 8px;border-radius:6px;margin-top:8px}
.risk-ok{background:var(--green2);color:var(--green)}
.risk-warn{background:var(--amber2);color:var(--amber)}
.risk-high{background:var(--red2);color:var(--red)}

/* WEATHER OVERLAY */
.wx-overlay{position:absolute;top:16px;left:16px;z-index:500;display:flex;flex-direction:column;gap:6px}
.wx-chip{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow);backdrop-filter:blur(4px)}
.wx-chip.danger{border-color:#fca5a5;background:rgba(254,242,242,.95)}
.wx-chip.warn{border-color:#fcd34d;background:rgba(255,251,235,.95)}
.wx-city{font-weight:700;color:var(--text)}
.wx-temp{font-family:var(--mono);font-weight:700;color:var(--text);margin-left:auto}

// ── Smart coordinate resolver ──
// Handles: city names, IATAs, LOCODEs, ICD strings, "City, State" format
function resolveCoord(location) {
  if (!location) return null;
  const loc = location.trim();

  // Direct match
  if (COORDS[loc]) return COORDS[loc];

  // Try first word (e.g. "BOM" from "BOM Airport")
  const firstWord = loc.split(/[\s,]/)[0];
  if (COORDS[firstWord]) return COORDS[firstWord];

  // Try city extraction from "City ICD, State" patterns
  // e.g. "Sabarmati ICD, Ahmedabad" → try "Ahmedabad"
  const commaCity = loc.split(',').map(s => s.trim()).find(s => COORDS[s]);
  if (commaCity) return COORDS[commaCity];

  // Try first city word from compound strings
  const words = loc.split(/[\s,]+/);
  for (const w of words) {
    if (COORDS[w]) return COORDS[w];
  }

  // Try partial match (case-insensitive) for any key containing this string
  const locLower = loc.toLowerCase();
  for (const [key, coord] of Object.entries(COORDS)) {
    if (key.toLowerCase().includes(locLower) || locLower.includes(key.toLowerCase())) {
      return coord;
    }
  }

  return null;
}

async function loadAll() {
  let ships = [];
  
  const savedShips = localStorage.getItem("vaanichain_ships");
  if (savedShips) {
    try {
      ships = JSON.parse(savedShips);
      console.log("Using synced shipment data from dashboard state for Map");
    } catch(e) {
      console.error("Failed to parse synced ships for Map", e);
    }
  }

  // Fallback to approvedReroutes if vaanichain_ships is not yet set
  if (!ships.length) {
    const localReroutes = localStorage.getItem('approvedReroutes');
    if (localReroutes) {
      try {
        ships = JSON.parse(localReroutes);
      } catch(e) {}
    }
  }

  try {
    const [sr, st] = await Promise.all([
      fetch(`${CONFIG.BASE_URL}/shipments`,{signal:AbortSignal.timeout(4000)}).then(r=>r.json()),
      fetch(`${CONFIG.BASE_URL}/status`,{signal:AbortSignal.timeout(4000)}).then(r=>r.json())
    ]);
    if (!ships.length) ships = sr;
    const risk = st.overall_risk || 'low';
    const pill = document.getElementById('risk-pill');
    if (risk==='high'){pill.className='nav-pill pill-high';pill.textContent='🔴 High Risk'}
    else if(risk==='medium'){pill.className='nav-pill pill-risk';pill.textContent='🟡 Medium'}
    else{pill.className='nav-pill pill-ok';pill.textContent='🟢 All Clear'}
  } catch {
    if (!ships.length) ships = getDefaultShips();
  }
  allShips = ships;
  document.getElementById('ship-count').textContent = `(${ships.length})`;
  renderSidebar(ships);
  renderMap(ships);
  fetchWeather();
}

function renderSidebar(ships) {
  let filtered = ships;

  else if (currentFilter !== 'all') filtered = ships.filter(s=>s.mode===currentFilter);

  document.getElementById('ship-list').innerHTML = filtered.length
    ? filtered.map(s => {
        const isActive = s.id === activeShipId;
        const seed = s.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
        const pct = (s.status==='on_time' || s.status==='REROUTED') ? Math.min(90,10+(seed%70)) : Math.min(60,5+(seed%50));
        return `<div class="ship-item ${isActive?'active':''} ${s.status}" onclick="focusShip('${s.id}')">

// ── RENDER MAP ──
function renderMap(ships) {
  // clear old
  markers.forEach(m=>map.removeLayer(m));
  polylines.forEach(p=>map.removeLayer(p));
  markers = []; polylines = [];

  let filtered = ships;
  if (currentView === 'active') filtered = ships.filter(s=>s.status==='on_time' || s.status==='REROUTED');
  if (currentView === 'risk')   filtered = ships.filter(s=>s.status==='at_risk' || s.status==='delayed');

  filtered.forEach(s => drawShipment(s));
}

function drawShipment(s) {
  const originCoord = resolveCoord(s.origin);
  const destCoord   = resolveCoord(s.destination);
  if (!originCoord || !destCoord) return;

  // Build path
  let path = [];
  if (s.selectedRoute && s.selectedRoute.via) {
    // If rerouted, we might want to show the new route. 
    // For simplicity in this UI, we just map O -> VIA -> D
    const viaCoord = resolveCoord(s.selectedRoute.via);
    path = [originCoord, viaCoord || originCoord, destCoord].filter(c => c);
  } else {
    const wps = WAYPOINTS[s.id];
    if (wps) {
      wps.forEach(stop => {
        const c = resolveCoord(stop);
        if (c) path.push(c);
      });
    }
  }
  if (path.length < 2) path = [originCoord, destCoord];

  const color = s.status === 'at_risk' || s.status === 'delayed' ? '#dc2626' : 
                s.status === 'REROUTED' ? '#2563eb' : (MODE_COLOR[s.mode] || '#6b7280');
  
  const weight  = activeShipId === s.id ? 5 : 3;
  const opacity = activeShipId === null || activeShipId === s.id ? 0.85 : 0.3;
  
  const dash = s.status === 'at_risk' || s.status === 'delayed' ? '10 5' :
               s.status === 'REROUTED' ? '5 5' :
               s.mode === 'air' ? '6 6' :
               s.mode === 'sea' ? '2 8' : null;

  const poly = L.polyline(path, {
    color, weight, opacity,
    dashArray: dash,
    smoothFactor: 1.5
  }).addTo(map);

  poly.on('click', () => focusShip(s.id));
  poly.bindTooltip(`${s.id} — ${s.origin} → ${s.destination} (${s.status})`, {sticky:true});
  polylines.push(poly);

  // Origin marker
  const oMarker = L.circleMarker(originCoord, {
    radius: 7, fillColor: color, color: '#fff', weight: 2,
    fillOpacity: 1, opacity: opacity
  }).addTo(map);
  oMarker.on('click', () => focusShip(s.id));
  markers.push(oMarker);

  // Destination marker
  const dMarker = L.circleMarker(destCoord, {
    radius: 7, fillColor: color, color: '#fff', weight: 2,
    fillOpacity: 0.5, opacity: opacity
  }).addTo(map);
  dMarker.on('click', () => focusShip(s.id));
  markers.push(dMarker);

  // Current position
  const seed = s.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const pct  = (s.status==='on_time' || s.status==='REROUTED') ? Math.min(0.9,(10+(seed%70))/100) : Math.min(0.6,(5+(seed%50))/100);
  const posIdx = Math.min(Math.floor(pct * (path.length - 1)), path.length - 2);
  const t      = (pct * (path.length - 1)) - posIdx;
  const p1     = path[posIdx], p2 = path[posIdx + 1];
  const curPos = [p1[0] + (p2[0]-p1[0])*t, p1[1] + (p2[1]-p1[1])*t];

  const curIcon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;background:${s.status==='at_risk' || s.status==='delayed'?'#dc2626':s.status==='REROUTED'?'#2563eb':'#059669'};border:3px solid white;border-radius:50%;box-shadow:0 0 0 3px rgba(0,0,0,0.1),0 2px 6px rgba(0,0,0,0.2)"></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });
  const curMarker = L.marker(curPos, {icon: curIcon, zIndexOffset: 1000}).addTo(map);
  curMarker.on('click', () => focusShip(s.id));
  markers.push(curMarker);
}

// ── FOCUS SHIPMENT ──
function focusShip(id) {
  activeShipId = id;
  const s = allShips.find(x=>x.id===id);
  if (!s) return;

  // re-render map with this ship highlighted
  renderMap(allShips);
  renderSidebar(allShips);

  // show detail panel
  const seed = s.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const pct  = s.status==='on_time' ? Math.min(90,10+(seed%70)) : Math.min(60,5+(seed%50));
  const km   = Math.round((pct/100)*(s.eta_hours*65));
  const etaL = Math.round(s.eta_hours*(1-pct/100));

  document.getElementById('dp-id').textContent    = s.id;
  document.getElementById('dp-route').textContent = `${s.origin} → ${s.destination}`;
  document.getElementById('dp-orig').textContent  = s.origin?.split(' ')[0];
  document.getElementById('dp-dest').textContent  = s.destination?.split(' ')[0];
  document.getElementById('dp-fill').style.width  = pct + '%';
  document.getElementById('dp-km').textContent    = `~${km} km covered`;
  document.getElementById('dp-eta').textContent   = `~${etaL}h left`;
  document.getElementById('dp-grid').innerHTML = [
    ['Mode',   `${MODE_ICON[s.mode]} ${s.mode}`],
    ['Route',  s.route||'—'],
    ['Cargo',  s.cargo||'—'],
    ['ETA',    s.eta_hours+'h'],
    ['Weight', s.weight_kg?(s.weight_kg).toLocaleString()+'kg':'—'],
    ['Supplier', s.supplier||'—'],
  ].map(([k,v])=>`<div class="dp-cell"><div class="dp-key">${k}</div><div class="dp-val" style="font-family:var(--sans);font-size:11px;font-weight:600">${v}</div></div>`).join('');

  const risk = getPredictiveRisk(s);
  const riskEl = document.getElementById('dp-risk');
  riskEl.className = `dp-risk risk-${risk.level === 'high' ? 'high' : risk.level === 'medium' ? 'warn' : 'ok'}`;
  const factorLines = (risk.factors||[]).slice(0,3).map(f=>`${f.icon} ${f.label}`).join(' · ');
  riskEl.innerHTML = risk.level === 'low'
    ? '✅ All clear — 8 factors checked'
    : `${risk.level==='high'?'🔴':'⚠'} ${risk.factors?.length||1} risks: ${factorLines}`;

  document.getElementById('detail-panel').classList.add('open');

  // fly to route on map
  const originCoord = resolveCoord(s.origin);
  const destCoord   = resolveCoord(s.destination);
  if (originCoord && destCoord) {
    const bounds = L.latLngBounds([originCoord, destCoord]);
    map.flyToBounds(bounds, {padding:[60,60], duration:0.8});
  }
}

function closeDetail() {
  activeShipId = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderMap(allShips);
  renderSidebar(allShips);
}

const WX_CITIES = [
  {name:'Mumbai', lat:19.076, lon:72.878},
  {name:'Delhi',  lat:28.614, lon:77.209},
  {name:'Chennai',lat:13.083, lon:80.271},
  {name:'Kolkata',lat:22.573, lon:88.364},
];

async function fetchWeather() {
  const overlay = document.getElementById('wx-overlay');
  const results = [];
  for (const c of WX_CITIES) {
    try {
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current=temperature_2m,precipitation,rain,weather_code,wind_speed_10m&forecast_days=1`,{signal:AbortSignal.timeout(6000)});
      const d = await r.json(); const cur = d.current;
      results.push({name:c.name, temp:Math.round(cur.temperature_2m||0), rain:cur.rain||0, code:cur.weather_code||0});
    } catch {}
  }
  overlay.innerHTML = results.map(w => {
    const isHeavy = w.rain > 5 || w.code >= 80;
    const isLight = w.rain > 0 && w.rain <= 5;
    const cls     = isHeavy ? 'danger' : isLight ? 'warn' : '';
    const icon    = isHeavy ? '🌧️' : isLight ? '🌦️' : '☀️';
    return `<div class="wx-chip ${cls}">
      <span>${icon}</span>
      <span class="wx-city">${w.name}</span>
      ${w.rain > 0 ? `<span style="font-size:10px;color:var(--red);font-weight:700">${Math.round(w.rain)}mm</span>` : ''}
      <span class="wx-temp">${w.temp}°C</span>
    </div>`;
  }).join('');
}


// ═══════════════════════════════════════════════════════════════
// VAANICHAIN — MULTI-FACTOR DISRUPTION INTELLIGENCE ENGINE v2.0
// Factors: Weather · Festival · E-way Bill · Driver Fatigue ·
//          Port Congestion · Strike · Breakdown · Regulatory
// ═══════════════════════════════════════════════════════════════

const RISK_ENGINE = {

  // ── 1. FESTIVAL / EVENT CONGESTION ──
  // Traffic on Indian highways spikes 2-3x during these windows
  FESTIVALS: [
    {name:'Diwali',        month:10, days:[1,15],  impact:40, modes:['road'],           note:'3x road congestion, transporter shortage'},
    {name:'Durga Puja',    month:9,  days:[1,15],  impact:30, modes:['road','rail'],     note:'Heavy movement in East India'},
    {name:'Eid ul-Fitr',   month:3,  days:[28,31], impact:25, modes:['road'],           note:'Pan-India road congestion'},
    {name:'Holi',          month:2,  days:[24,26], impact:20, modes:['road'],           note:'North India highway slowdown'},
    {name:'Ganesh Chaturthi',month:8,days:[20,31], impact:30, modes:['road','sea'],     note:'Mumbai port area congestion'},
    {name:'Pongal',        month:0,  days:[13,16], impact:20, modes:['road'],           note:'South India freight slowdown'},
    {name:'New Year',      month:11, days:[29,31], impact:15, modes:['air'],            note:'Air cargo capacity squeeze'},
    {name:'Republic Day',  month:0,  days:[24,27], impact:15, modes:['road','air'],     note:'Delhi route restrictions'},
    {name:'Independence Day',month:7,days:[13,16], impact:10, modes:['road','air'],     note:'Route diversions near capitals'},
    {name:'Harvest Season (Kharif)',month:9,days:[1,30],impact:20,modes:['road'],       note:'Agri trucks flood NH-44, NH-48'},
    {name:'Harvest Season (Rabi)',  month:3,days:[1,30],impact:15,modes:['road'],       note:'Wheat harvest — NH-1, NH-19 slow'},
  ],

  getFestivalRisk(month, day, mode) {
    const hits = this.FESTIVALS.filter(f =>
      f.month === month &&
      day >= f.days[0] && day <= f.days[1] &&
      (f.modes.includes(mode) || f.modes.includes('all'))
    );
    if (!hits.length) return null;
    const top = hits.sort((a,b)=>b.impact-a.impact)[0];
    return { score: top.impact, name: top.name, note: top.note };
  },

  // ── 2. E-WAY BILL EXPIRY ──
  // GST e-way bill validity = 1 day per 100km (min 1 day)
  // Over 400km needs extension — heavy penalty if expired at checkpost
  getEwayRisk(etaHours, routeKm) {
    if (!routeKm || !etaHours) return null;
    const validityDays = Math.max(1, Math.floor(routeKm / 100));
    const validityHours = validityDays * 24;
    const bufferHours = validityHours - etaHours;
    if (bufferHours < 4) {
      return {
        score: 45,
        note: `E-way bill expires in <${Math.max(0,Math.round(bufferHours))}h — renew before departure`,
        critical: true
      };
    } else if (bufferHours < 12) {
      return { score: 20, note: `E-way bill tight — ${Math.round(bufferHours)}h buffer only` };
    }
    return null;
  },

  // ── 3. DRIVER FATIGUE & MANDATORY REST ──
  // MoRTH rule: max 10h continuous driving, mandatory 8h rest after
  // Long hauls >500km need driver change or overnight stop
  getDriverFatigueRisk(etaHours, mode) {
    if (mode !== 'road') return null;
    if (etaHours > 20) {
      return {
        score: 35,
        note: `${etaHours}h journey — mandatory rest stop required (MoRTH rule)`,
        stops: Math.floor(etaHours / 10)
      };
    } else if (etaHours > 10) {
      return {
        score: 20,
        note: `${etaHours}h journey — single driver at fatigue limit`
      };
    }
    return null;
  },

  // ── 4. PORT CONGESTION INDEX ──
  // Simulates real JNPT/Chennai port congestion patterns
  // JNPT: high congestion Oct–Dec (pre-Christmas exports)
  // Monsoon: Jun–Aug affects loading/unloading
  getPortCongestionRisk(month, mode, destination) {
    if (mode !== 'sea') return null;
    const dest = (destination || '').toLowerCase();
    let score = 0, note = '';

    // JNPT seasonal patterns
    if (month >= 9 && month <= 11) {
      score = 40; note = 'JNPT pre-Christmas export surge — 3-5 day berth wait';
    } else if (month >= 5 && month <= 7) {
      score = 30; note = 'Monsoon slows port operations — crane stoppages';
    } else {
      score = 10; note = 'Normal port operations';
    }

    // Chennai port — known for slower customs
    if (dest.includes('chennai') || dest.includes('colombo')) {
      score += 10; note += ' · Chennai customs: 24-48h avg clearance';
    }
    // International routes: longer customs
    if (dest.includes('singapore') || dest.includes('rotterdam') || dest.includes('dubai')) {
      score += 15; note += ' · EXIM documentation required';
    }
    return score > 0 ? { score: Math.min(score, 60), note } : null;
  },

  // ── 5. STRIKE / BANDH INTELLIGENCE ──
  // Based on known recurring patterns in India
  getStrikeRisk(month, route, mode) {
    const r = (route || '').toLowerCase();
    const risks = [];

    // Truckers' strike — happens 2-3x a year typically
    // Last major: July 2023, Feb 2024
    if (month === 1 || month === 6) {
      if (mode === 'road') {
        risks.push({ score: 35, note: "Truckers' strike season — monitor AITWA alerts" });
      }
    }
    // State bandhs — Karnataka (March election), Bengal (various)
    if (month === 2 && (r.includes('bengaluru') || r.includes('karnataka'))) {
      risks.push({ score: 25, note: 'Karnataka election season — possible bandh' });
    }
    // Port workers — JNPT workers' strikes historically in monsoon
    if (month >= 5 && month <= 8 && mode === 'sea') {
      risks.push({ score: 20, note: 'Port worker union activity — possible go-slow' });
    }
    // Delhi NCR protest routes — NH-44, NH-48 blocked historically
    if ((month === 11 || month === 0) && (r.includes('delhi') || r.includes('nh-44') || r.includes('nh-48'))) {
      risks.push({ score: 30, note: 'NH-44/NH-48 protest blockade risk (Delhi border)' });
    }

    return risks.length ? risks[0] : null;
  },

  // ── 6. VEHICLE BREAKDOWN PROBABILITY ──
  // Based on: route km, vehicle type, road condition index
  getBreakdownRisk(etaHours, mode, cargo) {
    if (mode !== 'road') return null;
    const routeKm = etaHours * 65;

    // Long distance = higher breakdown probability
    if (routeKm > 1200) {
      return {
        score: 25,
        note: `${routeKm.toLocaleString('en-IN')}km haul — tyre blowout / engine risk on NH`
      };
    } else if (routeKm > 600) {
      return {
        score: 12,
        note: `${routeKm.toLocaleString('en-IN')}km — standard maintenance check required`
      };
    }
    return null;
  },

  // ── 7. REGULATORY / PERMIT RISK ──
  // Inter-state permits, hazmat, oversized load
  getRegulatoryRisk(cargo, route, mode) {
    const c = (cargo || '').toLowerCase();
    const r = (route || '').toLowerCase();
    const risks = [];

    if (c.includes('chemical') || c.includes('fuel') || c.includes('hazmat')) {
      risks.push({ score: 30, note: 'ADG permit required — MoRTH · hazmat restricted zones' });
    }
    if (c.includes('pharma') || c.includes('medical')) {
      risks.push({ score: 15, note: 'Cold chain compliance · drug license at checkpost' });
    }
    // Night driving ban on certain highways
    if (mode === 'road' && (r.includes('nh-66') || r.includes('coastal'))) {
      risks.push({ score: 10, note: 'NH-66 night driving restrictions on ghat sections' });
    }
    return risks.length ? risks[0] : null;
  },

  // ── 8. INFRASTRUCTURE RISK ──
  // Known bad stretches, accident-prone zones
  getInfrastructureRisk(route, mode) {
    const r = (route || '').toLowerCase();
    const infraRisks = {
      'nh-48':  { score: 20, note: 'NH-48: highest accident density in India (NHAI data)' },
      'nh-19':  { score: 25, note: 'NH-19: Bihar section — pothole density, flooding risk' },
      'nh-66':  { score: 20, note: 'NH-66 ghat: landslide-prone, narrow carriageway' },
      'nh-44':  { score: 15, note: 'NH-44: construction delays near Nagpur interchange' },
      'ghat':   { score: 25, note: 'Ghat section: speed limit 30 km/h, overloaded trucks' },
      'kazigund':{ score:30, note: 'Kazigund-Banihal: J&K snowfall blocks' },
      'nathu la':{ score:35, note: 'Nathu La: high altitude, weather closure' },
    };
    for (const [key, val] of Object.entries(infraRisks)) {
      if (r.includes(key)) return val;
    }
    return null;
  },

  // ── MASTER SCORER ──
  // Aggregates all 8 factors + weather into a single risk profile
  getFullRisk(shipment, weatherData) {
    const month = new Date().getMonth();
    const day   = new Date().getDate();
    const mode  = shipment.mode  || 'road';
    const route = shipment.route || '';
    const cargo = shipment.cargo || '';
    const eta   = shipment.eta_hours || 12;
    const km    = eta * 65;
    const dest  = shipment.destination || '';

    const factors = [];
    let totalScore = 0;

    // Weather (existing)
    if (weatherData) {
      const ow = weatherData[shipment.origin];
      const dw = weatherData[shipment.destination];
      if (ow?.rain_mm > 5)  { factors.push({ icon:'🌧', label:'Weather', detail:`Heavy rain at ${shipment.origin} — ${Math.round(ow.rain_mm)}mm`, score:30, severity:'high' }); totalScore+=30; }
      else if (ow?.rain_mm > 0) { factors.push({ icon:'🌦', label:'Weather', detail:`Light rain at ${shipment.origin}`, score:10, severity:'medium' }); totalScore+=10; }
      if (dw?.rain_mm > 5)  { factors.push({ icon:'🌧', label:'Weather', detail:`Heavy rain at ${dest} — ${Math.round(dw.rain_mm)}mm`, score:25, severity:'high' }); totalScore+=25; }
    }

    // Seasonal weather
    if (month>=5&&month<=8) {
      if (mode==='road'&&(route.toLowerCase().includes('nh-48')||route.toLowerCase().includes('nh-19'))) {
        factors.push({icon:'🌊',label:'Monsoon',detail:'Highway flooding risk (Jun–Sep)',score:25,severity:'high'}); totalScore+=25;
      } else if (mode==='sea') {
        factors.push({icon:'🌀',label:'Cyclone Season',detail:'Bay of Bengal — Jun–Sep',score:20,severity:'high'}); totalScore+=20;
      }
    }
    if ((month===11||month<=1)&&(mode==='air'||route.toLowerCase().includes('delhi'))) {
      factors.push({icon:'🌫',label:'Dense Fog',detail:'IGI Delhi fog season Dec–Feb',score:25,severity:'high'}); totalScore+=25;
    }

    // Festival
    const fest = this.getFestivalRisk(month, day, mode);
    if (fest) { factors.push({icon:'🎉',label:'Festival Congestion',detail:`${fest.name} — ${fest.note}`,score:fest.score,severity:fest.score>30?'high':'medium'}); totalScore+=fest.score; }

    // E-way bill
    const eway = this.getEwayRisk(eta, km);
    if (eway) { factors.push({icon:'📋',label:'E-way Bill',detail:eway.note,score:eway.score,severity:eway.critical?'high':'medium'}); totalScore+=eway.score; }

    // Driver fatigue
    const fatigue = this.getDriverFatigueRisk(eta, mode);
    if (fatigue) { factors.push({icon:'😴',label:'Driver Fatigue',detail:fatigue.note,score:fatigue.score,severity:fatigue.score>25?'high':'medium'}); totalScore+=fatigue.score; }

    // Port congestion
    const port = this.getPortCongestionRisk(month, mode, dest);
    if (port&&port.score>10) { factors.push({icon:'⚓',label:'Port Congestion',detail:port.note,score:port.score,severity:port.score>35?'high':'medium'}); totalScore+=port.score; }

    // Strike
    const strike = this.getStrikeRisk(month, route, mode);
    if (strike) { factors.push({icon:'🚧',label:'Strike Risk',detail:strike.note,score:strike.score,severity:strike.score>30?'high':'medium'}); totalScore+=strike.score; }

    // Breakdown
    const breakdown = this.getBreakdownRisk(eta, mode, cargo);
    if (breakdown) { factors.push({icon:'🔧',label:'Breakdown Risk',detail:breakdown.note,score:breakdown.score,severity:'medium'}); totalScore+=breakdown.score; }

    // Regulatory
    const reg = this.getRegulatoryRisk(cargo, route, mode);
    if (reg) { factors.push({icon:'📑',label:'Regulatory',detail:reg.note,score:reg.score,severity:reg.score>25?'high':'medium'}); totalScore+=reg.score; }

    // Infrastructure
    const infra = this.getInfrastructureRisk(route, mode);
    if (infra) { factors.push({icon:'🛣',label:'Infrastructure',detail:infra.note,score:infra.score,severity:'medium'}); totalScore+=infra.score; }

    // Cargo sensitivity multiplier
    if (cargo.toLowerCase().includes('pharma')||cargo.toLowerCase().includes('medical')) {
      totalScore = Math.round(totalScore * 1.3);
    }

    totalScore = Math.min(totalScore, 100);
    const level = totalScore >= 60 ? 'high' : totalScore >= 30 ? 'medium' : 'low';

    return {
      score: totalScore,
      level,
      factors: factors.sort((a,b)=>b.score-a.score),
      topReason: factors[0]?.detail || 'All conditions normal',
      topIcon:   factors[0]?.icon   || '✅',
    };
  }
};

function getPredictiveRisk(s) {
  const r = RISK_ENGINE.getFullRisk(s, null);
  return { level: r.level, score: r.score, reason: r.topReason, factors: r.factors };
}
